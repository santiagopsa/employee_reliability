# Render Blueprint — IRRT v1.1 (PeakU × Vilü)
# Web service + Postgres gratuito. En Render: New → Blueprint → conectar este repo.
services:
  - type: web
    name: irrt-app
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: irrt-db
          property: connectionString

databases:
  - name: irrt-db
    plan: free
    databaseName: irrt
    user: irrt
